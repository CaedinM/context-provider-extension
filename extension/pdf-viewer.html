<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF — Context Provider</title>
  <script src="lib/pdf.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #525659; font-family: 'DM Sans', system-ui, sans-serif; }

    #viewer-layout {
      display: flex;
      height: 100vh;
    }

    #pdf-panel {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px;
      gap: 16px;
      min-width: 0;
    }

    #pdf-panel::-webkit-scrollbar { width: 6px; }
    #pdf-panel::-webkit-scrollbar-track { background: transparent; }
    #pdf-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

    .pdf-page {
      background: white;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      display: block;
      max-width: 100%;
    }

    #sidebar-frame {
      width: 340px;
      flex-shrink: 0;
      height: 100vh;
      border: none;
      border-left: 1px solid rgba(0,0,0,0.2);
      transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
      background: white;
    }

    #sidebar-frame.collapsed {
      width: 0;
    }

    #reopen-fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #4F46E5;
      border: none;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(79,70,229,0.5);
      z-index: 100;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    #reopen-fab.visible { display: flex; }

    #reopen-fab:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(79,70,229,0.6);
    }

    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #525659;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      gap: 14px;
      z-index: 50;
    }

    #loading-overlay.hidden { display: none; }

    #error-overlay {
      position: fixed;
      inset: 0;
      background: #525659;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      gap: 10px;
      text-align: center;
      padding: 32px;
      z-index: 50;
    }

    #error-overlay.visible { display: flex; }

    .overlay-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="overlay-spinner"></div>
    <span>Loading PDF…</span>
  </div>
  <div id="error-overlay">
    <div style="font-size:28px;">⚠</div>
    <p id="error-msg">Failed to load PDF.</p>
  </div>
  <div id="viewer-layout">
    <div id="pdf-panel"></div>
    <iframe id="sidebar-frame" src="sidebar.html"></iframe>
  </div>
  <button id="reopen-fab" title="Open Context sidebar">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="white"/>
    </svg>
  </button>
  <script src="pdf-viewer.js"></script>
</body>
</html>
