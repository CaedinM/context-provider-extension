<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Context Provider — Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: #fff;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 13px;
      color: #111827;
      -webkit-font-smoothing: antialiased;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #F3F4F6;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      background: #4F46E5;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 14px;
      font-weight: 500;
      color: #111827;
    }

    .logo-sub {
      font-size: 11px;
      color: #9CA3AF;
      margin-top: 1px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #6B7280;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 9px 11px;
      background: #F9FAFB;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      color: #111827;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: #C7D2FE;
      background: white;
    }

    .input-row {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }

    .input-row input {
      flex: 1;
    }

    .toggle-btn {
      padding: 0 10px;
      background: #F3F4F6;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      color: #6B7280;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .toggle-btn:hover { background: #E5E7EB; }

    .save-btn {
      width: 100%;
      padding: 10px;
      background: #4F46E5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 12px;
    }

    .save-btn:hover { background: #3730A3; }

    .status {
      font-size: 12px;
      text-align: center;
      min-height: 18px;
      color: #6B7280;
    }

    .status.success { color: #059669; }
    .status.error { color: #DC2626; }

    .hint {
      font-size: 11px;
      color: #9CA3AF;
      line-height: 1.5;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #F3F4F6;
    }

    .hint a {
      color: #4F46E5;
      text-decoration: none;
    }

    .hint a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-mark">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="currentColor"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">Context Provider</div>
      <div class="logo-sub">Settings</div>
    </div>
  </div>

  <label>Claude API Key</label>
  <div class="input-row">
    <input type="password" id="api-key-input" placeholder="sk-ant-api03-…" />
    <button class="toggle-btn" id="toggle-visibility">Show</button>
  </div>

  <button class="save-btn" id="save-btn">Save API Key</button>
  <div class="status" id="status"></div>

  <p class="hint">
    Get your API key from <a href="https://console.anthropic.com/account/keys" target="_blank">console.anthropic.com</a>. Your key is stored locally in your browser and never sent anywhere except directly to Anthropic's API.
  </p>

  <script src="options.js"></script>
</body>
</html>
